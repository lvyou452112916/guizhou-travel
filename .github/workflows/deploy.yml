name: 构建并部署到 Cloudflare R2

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 安装依赖
        run: npm install

      - name: 生成所有类型文章各一篇
        run: |
          node scripts/generate-article.mjs b4
          node scripts/generate-article.mjs b5
          node scripts/generate-article.mjs b8
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}

      - name: 准备部署文件
        run: |
          mkdir -p dist
          cp index.html dist/
          cp tuijian.html dist/
          cp duocai.html dist/
          cp 404.html dist/
          cp -r articles dist/
          cp -r erweima dist/ 2>/dev/null || true
          cp -r aaa dist/ 2>/dev/null || true
          cp -r 评价 dist/ 2>/dev/null || true
          cp -r 锦旗 dist/ 2>/dev/null || true

      - name: 上传到 Cloudflare R2
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          R2_ENDPOINT: https://4b69689452650557eee7e7d25e8d8c5f.r2.cloudflarestorage.com
        run: |
          aws s3 sync dist/ s3://${{ secrets.R2_BUCKET }}/ --endpoint-url=$R2_ENDPOINT --acl public-read --no-follow-symlinks

      - name: 验证部署
        run: |
          echo "部署完成"
          echo "R2 Bucket: ${{ secrets.R2_BUCKET }}"
          echo "Worker: https://guizhou-travel-worker.452112916.workers.dev"
