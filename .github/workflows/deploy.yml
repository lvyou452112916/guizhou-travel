name: 构建并部署到 Cloudflare R2

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 安装依赖
        run: npm install

      - name: 生成所有类型文章各一篇
        run: |
          node scripts/generate-article.mjs b4
          node scripts/generate-article.mjs b5
          node scripts/generate-article.mjs b8

      - name: 准备部署文件
        run: |
          mkdir -p dist
          cp index.html dist/
          cp tuijian.html dist/
          cp duocai.html dist/
          cp 404.html dist/
          cp -r articles dist/
          cp -r erweima dist/ 2>/dev/null || true
          cp -r aaa dist/ 2>/dev/null || true
          cp -r 评价 dist/ 2>/dev/null || true
          cp -r 锦旗 dist/ 2>/dev/null || true

      - name: 上传到 Cloudflare R2
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: r2 object put --recursive --yes dist/ --bucket=${{ secrets.R2_BUCKET }}

      - name: 验证部署
        run: |
          echo "部署完成"
          echo "R2 Bucket: ${{ secrets.R2_BUCKET }}"
          echo "Worker: https://guizhou-travel-worker.452112916.workers.dev"
